# nginx.survey.conf
# What: Nginx template for CDN-friendly cache headers in a Vite SPA project.
# Responsibility boundary:
# 1) Make index.html and API responses non-cacheable.
# 2) Make hashed static assets and media long-term cacheable.
# 3) Keep sw.js non-cacheable to ensure fast Service Worker updates.
# Exposed interface:
# - server/location directives that can be merged into your Nginx site config.

server {
    listen 80;
    server_name your-domain.com;

    root /var/www/microswift/dist;
    index index.html;

    # Hashed Vite assets - long-term immutable cache.
    location ^~ /assets/ {
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable" always;
    }

    # Common media and font files.
    location ~* \.(?:png|jpe?g|gif|svg|webp|ico|woff2?|ttf|otf)$ {
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # Service Worker should never be cached.
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # 版本清单用于更新探测与问题排查，必须实时读取。
    location = /version.json {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # API should never be cached at browser or CDN level.
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:1340;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-cache, no-store, must-revalidate, private" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Explicit index rule for strict non-cache behavior.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # SPA fallback with non-cache headers.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
}
